name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: propmanage
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/propmanage?schema=public"
      AUTH_SECRET: "ci-only-insecure-secret-00000000000000000000000000000000"
      NEXTAUTH_URL: "http://localhost:3000"
      APP_URL: "http://localhost:3000"
      SERVICE_MODE: "mock"
      STORAGE_DRIVER: "mock"
      QUEUE_DRIVER: "memory"
      EMAIL_DRIVER: "mock"
      # Closed-beta gate: the seeded e2e users must be allow-listed to sign in.
      BETA_TESTER_EMAILS: "landlord@example.com,accountant@example.com"
      # No Redis in CI; disable the (in-memory) rate limiter so the e2e sign-ins
      # are never throttled across the suite.
      DISABLE_RATE_LIMIT: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: npm run db:seed

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Smoke test (e2e)
        run: npm run e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
