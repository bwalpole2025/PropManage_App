name: Preview deploy

# Deploys a per-PR preview to Vercel. Gated on the VERCEL_* secrets so the
# workflow is a no-op (and never fails the PR) when they aren't configured —
# add VERCEL_TOKEN, VERCEL_ORG_ID and VERCEL_PROJECT_ID in repo settings to
# enable it. The preview's DATABASE_URL etc. come from the Vercel project's
# Preview-environment variables; `vercel build` runs `prisma migrate deploy`
# (see vercel.json) against that database.

on:
  pull_request:

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Check Vercel is configured
        id: guard
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Vercel secrets not set — skipping preview deploy."
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.enabled == 'true'

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.enabled == 'true'
        with:
          node-version: "20"

      - name: Pull Vercel environment
        if: steps.guard.outputs.enabled == 'true'
        run: npx vercel@latest pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build
        if: steps.guard.outputs.enabled == 'true'
        run: npx vercel@latest build --token="$VERCEL_TOKEN"

      - name: Deploy preview
        if: steps.guard.outputs.enabled == 'true'
        id: deploy
        run: |
          URL=$(npx vercel@latest deploy --prebuilt --token="$VERCEL_TOKEN")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "### Preview deployed :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "$URL" >> "$GITHUB_STEP_SUMMARY"
